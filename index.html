<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>World Clock</title>
</head>
<body>
    <div class="container">
    <h1>🌎World Clock</h1>

    <select name="" id="">
        <option value="">Choose a city</option>
        <option value="">London</option>
        <option value="">New York</option>
        <option value="">Auckland</option>
    </select>

    <div class="city">
        <div>
        <h2>Los Angeles</h2>
        <div class="date">May 30th 2026</div>
        </div>
        <div class="time">1:15:15 <small>PM</small></div>
    </div>
    <div class="city">
        <div>
        <h2>Tokyo</h2>
        <div class="date">May 30th 2026</div>
        </div>
        <div class="time">1:15:15 <small>PM</small></div>
    </div>
    </div>
    <footer>This Project was coded with ❣️ by <strong>Phillipa Atieno</strong> and is <a href="https://github.com/Phillipa2/world-clock" target="_blank">open sourced on GitHub</a>.</footer>
    <script src="javascript/index.js"></script>
</body>
</html>
